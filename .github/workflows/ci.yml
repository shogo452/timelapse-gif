name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "web/**"
      - "*.md"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Run tests
        run: uv run pytest --cov --cov-report=term-missing
